<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leanrfb WebAssembly VNC Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000;
            color: #ccc;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

        /* Once connected, the canvas takes over the whole viewport (letterboxed,
           aspect ratio preserved) and the connect controls get out of the way. */
        body.connected {
            padding: 0;
            overflow: hidden;
        }

        body.connected .controls {
            display: none;
        }

        canvas {
            display: block;
            outline: none;
        }

        body.connected canvas {
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="controls">
        <input type="text" id="vnc-address" value="" placeholder="ws://host:port">
        <label><input type="checkbox" id="vnc-audio"> Enable audio (if server supports it)</label>
        <button id="btn-connect" onclick="connect()">Connect</button>
        <span id="status-text">Disconnected</span>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script>
        var Module = {
            preRun: [],
            postRun: [],
            print: (function() {
                return function(text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    console.log(text);
                    if (text.includes("WebSocket connection opened")) {
                        document.getElementById('status-text').innerText = "Connected";
                        document.body.classList.add('connected');
                    }
                    if (text.includes("WebSocket connection closed") || text.includes("WebSocket error")) {
                        document.getElementById('status-text').innerText = "Disconnected";
                        document.body.classList.remove('connected');
                    }
                };
            })(),
            printErr: function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.error(text);
            },
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener("contextmenu", function(e) { e.preventDefault(); }, false);
                return canvas;
            })(),
            setStatus: function(text) {
                console.log("Status: " + text);
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
            }
        };

        // Default to the host that served this page — the VNC server speaks
        // RFB-over-WebSocket on the same TCP port it serves this page from —
        // so "just works" when this client is loaded directly from the server.
        (function() {
            var field = document.getElementById('vnc-address');
            if (!field.value && location.host) {
                var scheme = location.protocol === 'https:' ? 'wss://' : 'ws://';
                field.value = scheme + location.host;
            }
        })();

        function connect() {
            var url = document.getElementById('vnc-address').value;
            var wantAudio = document.getElementById('vnc-audio').checked ? 1 : 0;
            console.log("Connecting to VNC server at: " + url);
            document.getElementById('status-text').innerText = "Connecting...";
            Module.ccall('connect_vnc', 'void', ['string', 'number'], [url, wantAudio]);
        }

        // Auto-connect once the WASM runtime is ready, using the address field's
        // default (this page's own host) so visiting the server's page is enough
        // on its own — no manual "Connect" click needed.
        Module.onRuntimeInitialized = function() {
            if (document.getElementById('vnc-address').value) {
                connect();
            }
        };

        // Paste support: catch text paste and notify WebAssembly client
        window.addEventListener('paste', function(e) {
            var text = e.clipboardData.getData('text');
            if (text) {
                Module.ccall('on_web_paste', 'void', ['string'], [text]);
            }
        });
    </script>
    <script async src="vncview_web.js"></script>
</body>
</html>
