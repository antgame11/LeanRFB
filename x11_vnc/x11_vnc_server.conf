# leanrfb x11_vnc_server configuration file

# TCP port to listen on (default: 5900)
port=5900

# Network interface address to bind to.
# Leave blank or use 0.0.0.0 to bind to all interfaces.
# Set to 127.0.0.1 for local connections only.
listen_host=0.0.0.0

# VNC desktop display name
display_name=leanrfb X11 Server

# Authentication password (VncAuth).
# Comment out or leave blank to disable authentication.
password=securitypasswd

# Maximum simultaneous VNC client connections (default: 16)
max_clients=16

# Enable WebSocket/HTTP mode on the same port (y/n) (default: n)
websocket=y

# Enable the encrypted UDP transport for H.264 video (y/n) (default: y).
# When enabled, clients that negotiate H.264 and opt into the UDP side-channel get
# low-latency video over a dedicated encrypted UDP socket on this same port number,
# with an automatic fallback to TCP for clients/networks that can't use it.
# Set to n to force H.264 video over TCP only (e.g. if UDP is blocked on your network).
# See docs/custom/rfb_h264_udp_extension.md for details.
enable_udp=y

# Resize the actual X display to this resolution (via XRandR) for the duration the
# server runs, then restore the original resolution on clean shutdown (Ctrl+C/SIGTERM).
# This changes the real X session's resolution — like running `xrandr -s WIDTHxHEIGHT`
# yourself — not just how the video is encoded, so every application on that display
# sees the new size too. Only an existing mode the driver already advertises can be
# selected (this does not synthesize a custom modeline); if WIDTHxHEIGHT isn't available,
# a warning is printed at startup and the current resolution is kept unchanged.
# Leave blank (the default) to leave the display resolution alone entirely.
# Example: resize_resolution=1280x720
resize_resolution=

# Let connected clients live-resize the desktop (y/n) (default: n).
# When enabled, a client that supports it (this project's vncviewer does) will ask the
# server to resize the real X display — via the same XRandR mechanism as
# resize_resolution above — whenever the client resizes its own window, e.g. by dragging
# a corner. The resize applies to the whole shared desktop for every connected client,
# not just the one that asked. Uses the standard RFB ExtendedDesktopSize/SetDesktopSize
# extension. Off by default since it lets any connecting client change your real screen
# resolution. See docs/custom/rfb_desktop_resize_extension.md for details.
allow_resize=n

