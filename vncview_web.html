<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leanrfb WebAssembly VNC Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f13;
            --container-bg: rgba(22, 22, 30, 0.7);
            --border-color: rgba(79, 70, 229, 0.4);
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 15px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .glass-panel {
            background: var(--container-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 960px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: border-color 0.3s;
        }

        .glass-panel:focus-within {
            border-color: rgba(99, 102, 241, 0.8);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        .input-group {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        input {
            width: 100%;
            background-color: rgba(17, 17, 23, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .status-container {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            transition: background-color 0.3s;
        }

        .status-dot.connected {
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .canvas-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050507;
            border-radius: 8px;
            overflow: hidden;
            min-height: 480px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        canvas {
            display: block;
            max-width: 100%;
            outline: none;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        /* Spinner for loading state */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary-color);
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>leanrfb VNC Viewer</h1>
        <p>Compiled to WebAssembly / HTML5 Canvas</p>
    </div>

    <div class="glass-panel">
        <div class="controls">
            <div class="input-group">
                <input type="text" id="vnc-address" value="" placeholder="ws://host:port">
            </div>
            <button id="btn-connect" onclick="connect()">Connect</button>
            <div class="status-container">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
        </div>

        <div class="canvas-container">
            <div id="spinner" class="spinner"></div>
            <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        </div>

        <div class="info-bar">
            <span>Clipboard sync active: Use standard Copy/Paste (Ctrl+C / Ctrl+V)</span>
            <span>SDL2 + WASM + WebSockets</span>
        </div>
    </div>

    <script>
        var Module = {
            preRun: [],
            postRun: [],
            print: (function() {
                return function(text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    console.log(text);
                    if (text.includes("WebSocket connection opened")) {
                        document.getElementById('status-dot').className = "status-dot connected";
                        document.getElementById('status-text').innerText = "Connected";
                        document.getElementById('spinner').style.display = "none";
                    }
                    if (text.includes("WebSocket connection closed") || text.includes("WebSocket error")) {
                        document.getElementById('status-dot').className = "status-dot";
                        document.getElementById('status-text').innerText = "Disconnected";
                        document.getElementById('spinner').style.display = "none";
                    }
                };
            })(),
            printErr: function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.error(text);
            },
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                // As a default behavior, prevent context menu on canvas
                canvas.addEventListener("contextmenu", function(e) { e.preventDefault(); }, false);
                return canvas;
            })(),
            setStatus: function(text) {
                console.log("Status: " + text);
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
            }
        };

        // Default to the host that served this page — the VNC server speaks
        // RFB-over-WebSocket on the same TCP port it serves this page from —
        // so "just works" when this client is loaded directly from the server.
        (function() {
            var field = document.getElementById('vnc-address');
            if (!field.value && location.host) {
                var scheme = location.protocol === 'https:' ? 'wss://' : 'ws://';
                field.value = scheme + location.host;
            }
        })();

        function connect() {
            var url = document.getElementById('vnc-address').value;
            console.log("Connecting to VNC server at: " + url);
            document.getElementById('spinner').style.display = "block";
            document.getElementById('status-text').innerText = "Connecting...";
            Module.ccall('connect_vnc', 'void', ['string'], [url]);
        }

        // Paste support: catch text paste and notify WebAssembly client
        window.addEventListener('paste', function(e) {
            var text = e.clipboardData.getData('text');
            if (text) {
                Module.ccall('on_web_paste', 'void', ['string'], [text]);
            }
        });
    </script>
    <script async src="vncview_web.js"></script>
</body>
</html>
